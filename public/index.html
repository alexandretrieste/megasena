<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volante Mega-Sena</title>
    <link rel="icon" type="image/png" href="/celebracao.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="accessibility-controls">
      <button id="decrease-font" aria-label="Diminuir tamanho da fonte" title="Diminuir fonte">A-</button>
      <span id="font-size-display">100%</span>
      <button id="increase-font" aria-label="Aumentar tamanho da fonte" title="Aumentar fonte">A+</button>
    </div>
    <main>
      <section class="card">
        <h1>Simulador de Volante Mega-Sena</h1>
        <a href="/admin.html" style="display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-weight: 500;">
          🎰 Painel Administrativo
        </a>
        <form id="volante-form">
          <label>
            Nome completo
            <input type="text" id="nome" name="nome" required minlength="3" placeholder="John Doe" />
          </label>
          <label>
            CPF
            <input
              type="text"
              id="cpf"
              name="cpf"
              required
              minlength="11"
              maxlength="11"
              inputmode="numeric"
              placeholder="Somente números"
            />
          </label>
          <p>Selecione entre 6 e 10 números (1 a 60):</p>
          <div id="numbers-grid"></div>
          <small id="selection-hint">0 números selecionados</small>
          <button type="submit">Enviar volante</button>
        </form>
        <p id="feedback" role="status"></p>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
