<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volante Mega-Sena</title>
    <link rel="icon" type="image/png" href="/celebracao.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Simulador de Volante Mega-Sena</h1>
        <form id="volante-form">
          <label>
            Nome completo
            <input type="text" id="nome" name="nome" required minlength="3" />
          </label>
          <label>
            CPF
            <input
              type="text"
              id="cpf"
              name="cpf"
              required
              minlength="11"
              maxlength="11"
              inputmode="numeric"
              placeholder="Somente números"
            />
          </label>
          <p>Selecione entre 6 e 10 números (1 a 60):</p>
          <div id="numbers-grid"></div>
          <small id="selection-hint">0 números selecionados</small>
          <button type="submit">Enviar volante</button>
        </form>
        <p id="feedback" role="status"></p>
      </section>

      <section class="card">
        <h2>Top 10 números sugeridos</h2>
        <p id="stats-summary">Carregando estatísticas...</p>
        <table>
          <thead>
            <tr>
              <th>Número</th>
              <th>Qtd. recomendações</th>
            </tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
